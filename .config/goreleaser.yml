# GoReleaser configuration for sageox
# See https://goreleaser.com for documentation

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ox-linux-amd64
    main: ./cmd/ox
    binary: ox
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X github.com/sageox/ox/internal/version.Version={{.Version}}
      - -X github.com/sageox/ox/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/sageox/ox/internal/version.BuildDate={{.Date}}
      - -X 'github.com/sageox/ox/internal/signing.EmbeddedPublicKey={{ .Env.SAGEOX_CLI_PUBLIC_KEY }}'
      - -X 'github.com/sageox/ox/internal/signing.EmbeddedSignatures={{ .Env.SAGEOX_CLI_SIGNATURES }}'

  - id: ox-linux-arm64
    main: ./cmd/ox
    binary: ox
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm64
    ldflags:
      - -s -w
      - -X github.com/sageox/ox/internal/version.Version={{.Version}}
      - -X github.com/sageox/ox/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/sageox/ox/internal/version.BuildDate={{.Date}}
      - -X 'github.com/sageox/ox/internal/signing.EmbeddedPublicKey={{ .Env.SAGEOX_CLI_PUBLIC_KEY }}'
      - -X 'github.com/sageox/ox/internal/signing.EmbeddedSignatures={{ .Env.SAGEOX_CLI_SIGNATURES }}'

  - id: ox-darwin-amd64
    main: ./cmd/ox
    binary: ox
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X github.com/sageox/ox/internal/version.Version={{.Version}}
      - -X github.com/sageox/ox/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/sageox/ox/internal/version.BuildDate={{.Date}}
      - -X 'github.com/sageox/ox/internal/signing.EmbeddedPublicKey={{ .Env.SAGEOX_CLI_PUBLIC_KEY }}'
      - -X 'github.com/sageox/ox/internal/signing.EmbeddedSignatures={{ .Env.SAGEOX_CLI_SIGNATURES }}'

  - id: ox-darwin-arm64
    main: ./cmd/ox
    binary: ox
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - -s -w
      - -X github.com/sageox/ox/internal/version.Version={{.Version}}
      - -X github.com/sageox/ox/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/sageox/ox/internal/version.BuildDate={{.Date}}
      - -X 'github.com/sageox/ox/internal/signing.EmbeddedPublicKey={{ .Env.SAGEOX_CLI_PUBLIC_KEY }}'
      - -X 'github.com/sageox/ox/internal/signing.EmbeddedSignatures={{ .Env.SAGEOX_CLI_SIGNATURES }}'

  - id: ox-freebsd-amd64
    main: ./cmd/ox
    binary: ox
    env:
      - CGO_ENABLED=0
    goos:
      - freebsd
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X github.com/sageox/ox/internal/version.Version={{.Version}}
      - -X github.com/sageox/ox/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/sageox/ox/internal/version.BuildDate={{.Date}}
      - -X 'github.com/sageox/ox/internal/signing.EmbeddedPublicKey={{ .Env.SAGEOX_CLI_PUBLIC_KEY }}'
      - -X 'github.com/sageox/ox/internal/signing.EmbeddedSignatures={{ .Env.SAGEOX_CLI_SIGNATURES }}'

archives:
  - id: ox-archive
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# Changelog disabled - we use human-written release notes
# Auto-generated changelogs with commit hashes confuse users
changelog:
  disable: true

release:
  github:
    owner: sageox
    name: ox
  # Keep existing release notes written by humans
  # GoReleaser only uploads binaries, doesn't touch notes
  mode: keep
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## ox v{{.Version}}

    Pre-compiled binaries for Linux, macOS (Intel & Apple Silicon), and FreeBSD.

    ### Installation

    **Quick Install (macOS/Linux/FreeBSD):**
    ```bash
    curl -sSL https://raw.githubusercontent.com/sageox/ox/main/scripts/install.sh | bash
    ```

    **Manual Install:**
    Download the appropriate binary for your platform below, extract it, and place it in your PATH.

announce:
  skip: true
